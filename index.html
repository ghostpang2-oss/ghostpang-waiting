<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>고스트팡 대기 목록</title>

<style>
body{
font-family:Arial;
background:black;
color:white;
text-align:center;
}

h1{
color:orange;
}

.container{
display:flex;
justify-content:center;
gap:50px;
}

table{
border-collapse:collapse;
width:400px;
}

th,td{
border:1px solid gray;
padding:10px;
}

th{
background:orange;
}
</style>

</head>

<body>

<h1>
<img src="블랙 고스트팡.png" style="height:70px; vertical-align:middle; margin-right:10px;">
고스트팡 대기 목록
</h1>

<div class="container">

<div>
<h2>큰방</h2>
<table>
<tr>
<th>순번</th>
<th>팀</th>
<th>인원</th>
</tr>

<tr>
<td>1</td>
<td>민수팀</td>
<td>4</td>
</tr>

</table>
</div>

<div>
<h2>작은방</h2>

<table>
<tr>
<th>순번</th>
<th>팀</th>
<th>인원</th>
</tr>

<tr>
<td>1</td>
<td>지훈팀</td>
<td>2</td>
</tr>

</table>

</div>

</div>

</body>
</html>
