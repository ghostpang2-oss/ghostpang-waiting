<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고스트팡 관리자</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 36px;
    }
    .sub {
      color: #bbb;
      margin-bottom: 24px;
    }
    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 160px 1fr 140px 1fr 140px;
      gap: 10px;
    }
    input, select, button {
      height: 48px;
      border-radius: 12px;
      border: none;
      padding: 0 14px;
      font-size: 16px;
    }
    input, select {
      background: #1c1c1c;
      color: #fff;
      border: 1px solid #2d2d2d;
    }
    button {
      background: #ff7a00;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .boards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .board {
      background: #111318;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }
    .board-head {
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }
    .big .board-head { background: #ff7a00; }
    .small .board-head { background: #4285f4; }
    .board-body { padding: 0; background: #0f1116; }
</html>
