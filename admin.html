<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고스트팡 관리자</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
padding:30px;
}

h1{
margin-bottom:20px;
}

.panel{
background:#111;
padding:20px;
border-radius:15px;
margin-bottom:30px;
}

input,select,button{
height:40px;
padding:0 10px;
margin-right:10px;
border-radius:8px;
border:none;
}

input,select{
background:#222;
color:#fff;
}

button{
background:#ff7a00;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.boards{
display:flex;
gap:30px;
}

.board{
flex:1;
background:#111;
border-radius:15px;
padding:20px;
}

.big{
border-top:8px solid #ff7a00;
}

.small{
border-top:8px solid #4285f4;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

.btn{
padding:5px 10px;
font-size:12px;
}

.enter{
background:#666;
}

.delete{
background:#c0392b;
}

</style>
</head>

<body>

<h1>고스트팡 관리자 화면</h1>

<div class="panel">

<select id="roomType">
<option value="big">큰방</option>
<option value="small">작은방</option>
</select>

<input id="teamName" placeholder="팀 이름">

<input id="peopleCount" type="number" placeholder="인원">

<input id="memo" placeholder="메모">

<button id="addBtn">대기 추가</button>

</div>

<div class="boards">

<div class="board big">
<h2>큰방 대기</h2>
<div id="bigBoard"></div>
</div>

<div class="board small">
<h2>작은방 대기</h2>
<div id="smallBoard"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp, updateDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyADGR45Y4rzrLsQk7dt05iCIu2d0NSe3NI",
authDomain: "ghostpang.firebaseapp.com",
projectId: "ghostpang",
storageBucket: "ghostpang.firebasestorage.app",
messagingSenderId: "494956996773",
appId: "1:494956996773:web:b3346f2116e88d8192054c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const queueRef = collection(db,"ghostpang_waiting");

const roomTypeEl = document.getElementById("roomType");
const teamNameEl = document.getElementById("teamName");
const peopleCountEl = document.getElementById("peopleCount");
const memoEl = document.getElementById("memo");
const addBtn = document.getElementById("addBtn");

async function addWaiting(){

const roomType = roomTypeEl.value;
const teamName = teamNameEl.value;
const peopleCount = peopleCountEl.value;
const memo = memoEl.value;

if(!teamName){
alert("팀 이름 입력");
return;
}

await addDoc(queueRef,{
roomType,
teamName,
peopleCount,
memo,
status:"waiting",
createdAt:serverTimestamp()
})

teamNameEl.value=""
peopleCountEl.value=""
memoEl.value=""

}

async function enterTeam(id){
await updateDoc(doc(db,"ghostpang_waiting",id),{
status:"entered"
})
}

async function removeTeam(id){

if(!confirm("삭제하시겠습니까?")) return

await deleteDoc(doc(db,"ghostpang_waiting",id))

}

function render(list){

if(list.length===0) return "대기 없음"

let html="<table>"

list.forEach((v,i)=>{

html+=`
<tr>
<td>${i+1}</td>
<td>${v.teamName}</td>
<td>${v.peopleCount}명</td>
<td>
<button class="btn enter" data-enter="${v.id}">입장</button>
<button class="btn delete" data-del="${v.id}">삭제</button>
</td>
</tr>
`

})

html+="</table>"

return html

}

function bindButtons(){

document.querySelectorAll("[data-enter]").forEach(btn=>{
btn.onclick=()=>enterTeam(btn.dataset.enter)
})

document.querySelectorAll("[data-del]").forEach(btn=>{
btn.onclick=()=>removeTeam(btn.dataset.del)
})

}

addBtn.onclick=addWaiting

const q = query(queueRef,orderBy("createdAt","asc"))

onSnapshot(q,(snapshot)=>{

const rows = snapshot.docs.map(doc=>({id:doc.id,...doc.data()}))

const big = rows.filter(v=>v.roomType==="big" && v.status==="waiting")
const small = rows.filter(v=>v.roomType==="small" && v.status==="waiting")

document.getElementById("bigBoard").innerHTML=render(big)
document.getElementById("smallBoard").innerHTML=render(small)

bindButtons()

})

</script>

</body>
</html>
