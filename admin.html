<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>고스트팡 대기 목록</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
margin:0;
padding:40px;
}

.board{
width:45%;
display:inline-block;
margin:20px;
background:#111;
border-radius:20px;
padding:20px;
}

.big{
border-top:8px solid #ff7a00;
}

.small{
border-top:8px solid #4285f4;
}

h2{
margin:0 0 20px 0;
}

.empty{
opacity:0.6;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<h1>고스트팡 대기 목록</h1>

<div class="board big">
<h2>큰방 대기</h2>
<div id="bigBoard">대기 없음</div>
</div>

<div class="board small">
<h2>작은방 대기</h2>
<div id="smallBoard">대기 없음</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyADGR45Y4rzrLsQk7dt05iCIu2d0NSe3NI",
authDomain: "ghostpang.firebaseapp.com",
projectId: "ghostpang",
storageBucket: "ghostpang.firebasestorage.app",
messagingSenderId: "494956996773",
appId: "1:494956996773:web:b3346f2116e88d8192054c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const queueRef = collection(db,"ghostpang_waiting");

const q = query(queueRef,orderBy("createdAt","asc"));

onSnapshot(q,(snapshot)=>{

const rows = snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));

const big = rows.filter(v=>v.roomType==="big" && v.status==="waiting");
const small = rows.filter(v=>v.roomType==="small" && v.status==="waiting");

function render(list){

if(list.length===0) return "<div class='empty'>현재 대기 없음</div>";

let html="<table>";

list.forEach((v,i)=>{

html+=`<tr>
<td>${i+1}</td>
<td>${v.teamName}</td>
<td>${v.peopleCount}명</td>
</tr>`

})

html+="</table>"

return html

}

document.getElementById("bigBoard").innerHTML=render(big)
document.getElementById("smallBoard").innerHTML=render(small)

})

</script>

</body>
</html>
