<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고스트팡 대기 목록</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    .wrap {
      width: 100%;
      min-height: 100vh;
      padding: 20px 24px 40px;
    }
    .title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
      font-size: 42px;
      font-weight: 800;
      color: #fff;
    }
    .title img {
      height: 72px;
      width: auto;
      display: block;
    }
    .boards {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
    }
    .board {
      flex: 1 1 600px;
      max-width: 720px;
      min-width: 320px;
      border-radius: 22px;
      overflow: hidden;
      background: #111318;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
    }
    .board-head {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 800;
      color: #fff;
    }
    .board.big .board-head { background: #ff7a00; }
    .board.small .board-head { background: #4285f4; }
    .summary {
      padding: 14px 18px;
      text-align: center;
      color: #d5d9e2;
      font-size: 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .board-body {
      min-height: 110px;
      padding: 0;
      background: linear-gradient(180deg, #121419 0%, #0d0f13 100%);
    }
    .empty {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #b7bcc7;
      text-align: center;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      color: #fff;
    }
    th, td {
      padding: 14px 10px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 18px;
    }
    th {
      color: #dfe3ea;
      font-size: 15px;
      font-weight: 700;
      background: rgba(255,255,255,0.03);
    }
    tr:last-child td { border-bottom: none; }
    .wait { color: #ffd08f; font-weight: 700; }
    @media (max-width: 900px) {
      .title { font-size: 30px; }
      .title img { height: 56px; }
      .board-head { font-size: 24px; height: 78px; }
      .empty { font-size: 18px; }
      th, td { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <img src="블랙 고스트팡.png" alt="고스트팡">
      <span>고스트팡 대기 목록</span>
    </div>

    <div class="boards">
      <div class="board big">
        <div class="board-head">큰방 대기</div>
        <div class="summary" id="bigSummary">현재 대기 0팀</div>
        <div class="board-body" id="bigBoard">
          <div class="empty">현재 대기팀이 없습니다</div>
        </div>
      </div>

      <div class="board small">
        <div class="board-head">작은방 대기</div>
        <div class="summary" id="smallSummary">현재 대기 0팀</div>
        <div class="board-body" id="smallBoard">
          <div class="empty">현재 대기팀이 없습니다</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyADGR45Y4rzrLsQk7dt05iCIu2d0NSe3NI",
      authDomain: "ghostpang.firebaseapp.com",
      projectId: "ghostpang",
      storageBucket: "ghostpang.firebasestorage.app",
      messagingSenderId: "494956996773",
      appId: "1:494956996773:web:b3346f2116e88d8192054c"
    };

    const BIG_WAIT_MIN = 20;
    const SMALL_WAIT_MIN = 20;

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const queueRef = collection(db, 'ghostpang_waiting');

    function waitText(index, unitMinutes) {
      const minutes = index * unitMinutes;
      return minutes === 0 ? '곧 입장' : `약 ${minutes}분`;
    }

    function renderBoard(list, unitMinutes) {
      const waiting = list.filter(v => v.status === 'waiting');
      if (waiting.length === 0) {
        return '<div class="empty">현재 대기팀이 없습니다</div>';
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>순번</th>
              <th>팀</th>
              <th>인원</th>
              <th>예상대기</th>
            </tr>
          </thead>
          <tbody>
      `;

      waiting.forEach((item, index) => {
        html += `
          <tr>
            <td>${index + 1}</td>
            <td>${item.teamName}</td>
            <td>${item.peopleCount}명</td>
            <td class="wait">${waitText(index, unitMinutes)}</td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      return html;
    }

    function renderSummary(list, unitMinutes) {
      const waiting = list.filter(v => v.status === 'waiting');
      const teams = waiting.length;
      const maxWait = teams > 0 ? (teams - 1) * unitMinutes : 0;
      return teams === 0 ? '현재 대기 0팀' : `현재 대기 ${teams}팀 · 예상 최대 ${maxWait}분`;
    }

    const q = query(queueRef, orderBy('createdAt', 'asc'));
    onSnapshot(q, snapshot => {
      const rows = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
      const big = rows.filter(v => v.roomType === 'big');
      const small = rows.filter(v => v.roomType === 'small');

      document.getElementById('bigSummary').textContent = renderSummary(big, BIG_WAIT_MIN);
      document.getElementById('smallSummary').textContent = renderSummary(small, SMALL_WAIT_MIN);
      document.getElementById('bigBoard').innerHTML = renderBoard(big, BIG_WAIT_MIN);
      document.getElementById('smallBoard').innerHTML = renderBoard(small, SMALL_WAIT_MIN);
    }, error => {
      console.error(error);
      document.getElementById('bigBoard').innerHTML = '<div class="empty">연결 오류가 발생했습니다</div>';
      document.getElementById('smallBoard').innerHTML = '<div class="empty">연결 오류가 발생했습니다</div>';
    });
  </script>
</body>
